front:
  text: 引天台賢首隨宜示法說天台賢首法者不自知也後人起念便隔作兩截重天台失天台重賢首失賢首矣執相泥名分河立幟此末法大弊通人宜無所揀擇軒輊於其間也賢首宗闕五教儀百亭法師為補綴成之以毒攻毒以楔出楔且憑楮墨施平等莫向眉端安是非殆不獨為賢首宗之功臣矣東南義虎略見一斑為兩宗左右袒者即勿寓目焉可也康熙庚申立秋日順天府府丞錢唐戴京曾題賢首五教儀序華嚴稱根本法輪不唯為開漸之本亦且為攝末之本竺乾震旦咸最尊尚諸佛歷祖遞代師承自龍樹依之判二種般若天親依之闡六相圓融杜順依之而演三觀雲華依之而開十玄至賢首大師則依此而立宗判教離台家之四以為五復得清涼憲章啓十門而會性相二教圭峯祖述敘五義而揀空性兩宗此皆神明天縱博贍旁通故能各騁辨才宏敷妙趣或造論或釋經法界宗旨燦然明備而一大時教已罄無遺蘊矣厥後繼圭峯而起者雖代有哲人而兼綜條貫洵蔑以加莫能更讚一詞乃味者不察讀一不讀一廢目而任耳伐異以黨同或譏其伏斷皆無或指為教觀兩失在台衡從上諸師或慮兩家末裔濫以賢首之旨混入己宗故弗惜曉曉而貶駮過當何意曾玄輩遂拾牙瀋逞狂盲妄肆詆訶橫起攻擊不至飲水分河不止噫疇復知固有大謬不然者哉先師寶輪大師博極諸宗尤於華嚴宿有緣契精研深入心領神會嘗痛賢首未墜之緒僅爾如線誓願振興絶業以繼往開來闡法後力宏此宗五教十玄蓋無時無處不高提圓唱也著五教解誚論論賢首宗未知圓義解二篇大旨謂賢首大師之離四以為五非悖天台實備天台之所未備清凉紹隆之即天台以清涼大師為大元勳亦匪為過中間晳兩家之殊塗若鏡懸會兩家之同歸若璧合且分銖不爽纖纍無偏則又若衡平向使悻悻者見此應無從置喙矣先師謂天台當以清涼大師為大元勳立亦謂先師實天台元勳不徒稱清涼嫡裔也立侍師有年徒以脫臼也晚塵封智錮致望海驚心入山空手而慈雲百兄法師抱頴悟絶倫之資親承提命往還咨決遂得髓於言下然深藏若良賈年來杜門却掃單與淨滿晨夕娛遊禪觀之餘則取是宗教部及諸祖著述研磨對會博觀約取先則支分條列而派析之後則徹委窮源而滙聚之録成一書首分時次敘儀次立教又次判宗終以明觀時則有先後通別儀有本末顯密教有始終頓圓宗有小大性相觀則有方便有因緣有對法有觀門有六相有十玄言簡義詳理融旨顯信解行證了然眉列讀之而猶謂之有教無觀得乎猶謂之伏斷修證俱無指示得乎今而後法界宗旨將不終屈抑也已然則是書也法師固不負為先師嫡子溯而上之將為圭峰為清涼為賢首以至龍樹諸大師之元勳亦併無歉於天台彼悻悻尋賢首隙者蓋無容置喙而平心以觀可矣乃命名曰賢首五教儀法師自謂竊比於高麗師稟玄義而録出四教儀云爾夫誰曰不然茲將校梓屬立辨端立甚喜華嚴根本法輪儼揭天日也遂合掌讚歎不顧鄙陋而為之辭如此梅塢興福教院法弟真立和南撰序孔子不可無思孟老子不可無莊周釋尊不可無慶喜為道之須傳也南嶽不可無智者戒賢不可無玄奘達摩不可無慧可為教之須人也又智者不可無章安玄奘不可無慈恩慧可不可無僧璨為其授受有源而不竭奕葉相承而無盡也逮於賢首大師何獨不然以言乎師則有杜順雲華開其先以言乎資則有清凉圭峰紹其後其立教也有始有終有頓有圓斷則斷其厚薄證則正其淺深位則品其高下行則定其遠近顯法相若然燭之朗明揀機益比析薪之分剖其判宗也有小有大有性有相相則妄相為相空則真空亦空頓則無所不絶似影離於天日圓則無所不融如像含於海空其分時也有先有後有別有通非先無以知其為開漸之頓非後無以知其為攝末之本非別無以見說法之次第非通無以見教理之圓融其敘儀也有本有末有顯有密非本無以了一乘之頓實非末無以識三乘之權漸非顯無以決擇其一定非密無以測度其不定其明觀也有方便有因緣有對法有觀門有六相有十玄非方便無以辨修證非因緣無以明德用非對法無以解無盡非觀門無以入法界非六相無以顯圓通非十玄無以彰無礙何者凡夫見色為實色見空為斷空故開真空絶相門使之觀色非實色舉體是真空觀空非斷空舉體是幻色如是於理則見矣於事猶未也復開理事無礙門使觀不可分之理皆圓攝於一塵本分限之事亦通遍於法界如是以理望事則可矣以事望事猶未也又開周遍含容門使觀全事之理隨事而一一可見全理之事隨理而一一可融然後一多無礙大小相含則隱顯施為神用不測矣教觀既周時儀已備則判釋諸佛說法儀式至矣盡矣無復加矣以此自修無法不通以此教他無機不被是以三帝歸崇兩朝悅服李長者論讚於前崔學士傳美於後至於海內海外莫不揚其化天上天下靡不仰其徽質諸千古以上之聖賢而無訛俟諸百世以下之俊傑而不惑遂令法門隆盛代有哲人長水流布於東吳蒼山崛起於西蜀雲捿敷演於南海交光發明於北嶺猗歟休哉奈何今義學家不得其門而入見其教部廣大意旨幽深即如賢首大師著述凡有一百餘卷清涼國師現流傳者約有四百餘卷圭峰大師疏注總有九十餘卷浮狂者詆為葛藤愚鈍者視為砂石誰復能探其微窺其奧哉幸我乳峰得水大師自弘法以來朝夕提撕時為演唱特未布諸方䇿普令一切見聞耳續法雖忝輪下性極顓蒙晝夜參隨日漸薰熟竊謂此皆賢家所傳心法若不傳於後葉在己則有吝法之愆在他安得正眼之益爰將先師常所樂說者録之復尋諸大部中所切要者集之十餘年間考閲再三窮思至四始成六卷名之曰五教儀庶得華嚴宗旨彌播於塵寰法界心印重光於昔日燈燈相續化化無窮矣謹述顛末冀見此衷至於知我罪我所不暇計焉時康熙十四年歲次乙卯秋仲望日古杭慈雲灌頂行者續法題賢首時儀教觀圖法界觀境普融無盡圖賢首大師判釋如來一代時教不出右圖三觀初祖杜順集成五教二祖雲華草創儀等四祖清涼添足宗等五祖圭峯加揀今圖標三祖賢首一師者蓋教觀由三祖而圓備宗儀由三祖而建興述作功德推尊獨在故不舉餘祖耳後之學法者務知開宗立教之主餘祖自該顯矣雲山灌頂行者續法識賢首五教儀條箇卷第一序時教圖法界觀圖別三時先照轉照還照問答三時名義通三時一念時一化時華嚴阿含方廣般若法華涅槃通妨卷第二三際時同類時異類時念攝時重收時異界時攝入時收末時通恆說妨通涅槃妨通諸教妨通相遍妨通餘佛妨通諸教妨十儀本末差別依本起末攝末歸本本末無礙隨機不定顯密同時一時頓演寂寞無言該通三際重重無盡五教名義五教所詮小教十門相十門空五門始教十門對相空十五門頓教十門圓教十門五教斷證小教諦障小教行位小教辟支佛果小教佛果卷第三始教執障始教斷證終教斷證頓教斷證圓教斷證五教機益小教機益始教機益終教機益頓教機益圓教機益五教通妨五教妨難釋名義妨釋分判妨立五所以所以會通會通諸教會通相收五教相收卷第四六宗法執後五宗揀性相濫揀空性濫揀空相性揀空性相揀性相空揀始頓濫揀終同濫揀同別濫總申開合別通妨難三觀方便外緣內障發大心受佛戒修勝行明心鏡卷第五揀觀智止觀性緣止觀入住止觀漸頓止觀均齊止觀緣境魔名魔境治魔覺悟治魔識責治魔止觀治魔經呪治魔正念病相治病顯果善根顯果辨僞顯果長養顯果證境三觀十對教義理事境智行位因果依正卷第六體用人法逆順感應圓融無盡真空觀四句十門無礙觀理遍事十門周遍觀十觀十玄相十玄事十玄喻次十玄開立十玄圓融十因心法十因緣起十因緣性十因法性修觀益揀修教觀依持結指賢首五教儀條箇終
