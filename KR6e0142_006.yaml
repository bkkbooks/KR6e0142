body:
  text: 清浙水慈雲沙門灌頂續法集録七體用者體則三途招上中下惡業苦報之身三道招下中上善業樂報之身二乘五分法身始教有為無漏變易五蘊之身終教無為無漏變易五蘊之身頓教無生法性身圓教圓融無盡身如來三四十身用則地獄登刀上劍餓鬼吞銅噉鐵畜生魚鱗相呾強者伏弱負重牽車搆造諸惡修羅我慢顛倒與天爭權人持五戒天修八定二乘勤䇿斷煩惱障證小涅槃三明六通應真無礙始教發四弘誓修六度行乃至現起三十二相八十種好終教稱性建修六度廣興萬行為化羣生運大慈悲乃至現起八萬四千諸妙相好頓教離相修一切行無作妙力起諸變化力通自在猶如虗空無有分齊圓教一斷一切斷一行一切行乃至現十蓮華藏世界海微塵數相彼一一相皆遍法界業用亦爾如來三輪不思議化八人法者人則火途血途刀途修羅人道天道聲聞辟支定不定性始終頓圓初心後心諸位菩薩如來法則三途上中下十惡三道下中上十善小教四諦十二因緣始教相宗五位百法空宗八十一法終教一心二門頓教一真如性圓教十不可說無盡法門如來十力四無所畏十八不共法等九逆順者逆則地獄跋陀增慢婆藪罪者畜生無慈鹿王餓鬼半偈夜叉修羅婆稚騫䭾質多羅睺人有六師十仙央崛屠兒等天有自在無想摩醯首羅二乘六羣比丘始終頓圓梵志尼犍盧迦登伽婆須無厭勝熱婆羅門等佛如提婆達多順則地獄蒙光天子挽火車者畜生菩薩鹿王金獅龍女餓鬼說呪羅剎啓教面然修羅幻術大力出現好聲人有四衆法眷天有護世釋梵二乘五百羅漢始終頓圓維摩大慧地藏彌勒文殊普賢勢至觀世音等佛如藥師彌陀十感應者感則六道同分類生二乘同分初心有學及異分六道凡夫始終頓圓自類根熟初心有學及他類二乘六道如來九界衆生應則六道同事之者及四聖身二乘四果四向菩薩如來始終頓圓三賢十聖五智如來佛有五眼十身此十對中初一為總後後漸略初謂如來說能詮之教詮所詮之理則無法不盡法有教理行果行果並在所詮義理中故二就所詮中雖復衆多不出事之與理即性及相無法不攝三理該下八且置勿論就其事中不出境智四智觀於境便有造修之行所成之位五歷位未極總屬因收極則為果六果中多法不出依正七正中所有不出體用體者法報用者應化八用中自有人法不同以法成人以人知法九就於法中逆化順化十就順化中自有感應矣若依後後開一成二則法彌多謂如果分依正為二因亦如之則有四矣隨依正中皆有體用正中體者法報等身用者應化隨宜依中體者法性等剎用者應物隨現果門既爾因門例然則成八矣正體用中自有人法不同依亦如之即成十六矣又於人中逆化順化法亦如之便為三十二矣人之逆順必有感應宜逆化之感則婆須等應之宜順化之感則文殊等應之人感應爾法感應然積為六十四矣如是相望展轉成多然猶約次第辨若依圓融論開合者即成無盡又此十對不唯十界於一界中隨一法上即有此十如一蓮葉或一微塵皆具教等十對相也又將此能含十對法中取一教義對具餘九對餘理事等九對亦具餘教義等九對則為百門一一門中各有所含十法界則為千門千門中隨取其一亦具一千則有百萬如一千錢共為緣起一錢為首則具一千餘亦如是即成千千若以所具十對例能具十界則十法界亦成百萬法界華嚴云一念瞋心起百萬障門開一念非瞋心百萬法門就又此百萬門中一一皆有六相圓融如理事對一即具多名理總多即非一名理別互不相違名理同彼此不濫名理異共相成就名理成各住本性名理壞共為一法名事總諸法宛然名事別多種不異名事同各不相同名事異諸緣辦就名事成不離自位名事壞餘教義等九對及十法界具百具千乃至百萬六相例知如此無盡圓融法相皆為三觀所依事體經云若人欲了知三世一切佛應觀法界性一切唯心造次明能依觀法門有三重第一真空絶相觀者於中略開四句十門第一句會色歸空觀復開四門一色非斷空門色不即是斷空以色舉體即是真空故二色非真空門青等非是真空之理以青黃無體莫不皆空故三色空非空門會色歸空空中必無色故上三門以法揀情訖四色即是空門凡是色法必不異於真空以無性故如色空既爾一切法亦然第二句明空即色觀亦有四門一空非幻色門斷空不即是色以真空必不異色故二空非實色門真空理非青黃以空必不異青黃故三空非空色門空是所依非能依必與能依作所依故上三門亦以法揀情訖四空即是色門凡是真空必不異色以是法無我理非斷滅故如空色既爾一切法亦然第三句空色無礙觀謂色法舉體全是真空色即空而色不盡真空舉體不異色法空即色而空不隱無障無礙為一味法第四句泯絶無寄觀謂此所觀真空不可言即色不即色即空不即空一切法皆不可此不可語亦不容受逈絶無寄言解不及以生心動念乖法體故前四句中初二句八門皆揀情顯解第三句一門解終趣行第四句一門正成行體由解成行行起解絶將前所依十對中取一理事對具此能依觀中十門而彼理事對中又具餘教義等九對各有此十觀門則為百門理事既爾餘教義等九對具百亦然則為千門千門之中隨取其一亦具一千餘亦如是則有百萬一即具多名總相多即非一名別相彼此不違名同相互不相濫名異相共相成辦名成相各居自位名壞相此等六相百萬法門皆為真空絶相觀相經云法性本空寂無取亦無見性空即是佛不可得思量第二理事無礙觀者但理事鎔融存亡逆順通有十門一理遍於事門謂無分限之理全遍有分事中以彼真理不可分故故一一纖塵理皆圓足如一大海全在一小波時而海非小又不妨舉體全遍諸波而海非異故出現云譬如法界遍一切不可見取為一切此明一性全在五性中也又云如來智慧無處不至此明一乘遍於三乘中也又云如來成正覺時於其身中普見一切衆生成正覺乃至普見一切衆生入涅槃皆同一性所謂無性此明理遍同於事故一成一切成也二事遍於理門謂有分限之事全同無分之理以事無體還如理故故一一纖塵皆遍法界如一小波全匝於大海時而波非大諸波亦各俱時全匝而波非一故出現云聲聞與獨覺及諸佛解脫皆依於法界法界無增減此明五性全在一性中也又云無一衆生不具如來智慧此明五乘遍於一乘中也又云譬如虗空無成無壞菩提亦爾無相非相無一非一此明事遍同於理故說都無所成也三依理成事門謂事無別體要因理成以諸緣起皆無自性由無性理事方成故如攬水體成立波相覺林菩薩偈云心如工𦘕師能𦘕諸世間五陰悉從生無法而不造覺首菩薩偈云法性本無生示現而有生四事能顯理門謂由事攬理成故事虗而理實以事虗故能顯實理如波相虗令水體現夜摩偈云分別此諸蘊其性本空寂空故不可滅此是無生義衆生既如是諸佛亦復然佛及諸佛法自性無所有須彌頂偈云了知一切法自性無所有如是解法性即見盧舍那五以理奪事門謂事法既全攬理成則理性現而事相皆盡以離真理外無片事可得故如水奪波波相全盡出現品云設一切衆生於一念中悉成正覺與不成正覺等無有異何以故菩提無相故若無有相則無增減不增不減經云一切愚癡不如實知一法界故起邪見心謂衆生界增衆生界減皆顯平等理性無有高下法也六事能隱理門謂真理隨緣而成事法遂令事顯理不顯也以諸事法違於理故如水成波動顯靜隱財首偈云世間所言論一切是分別未曾有一法得入於法性法身經云法身流轉五道名曰衆生七真理即事門謂凡是真理必非事外以是法無我理不異色故如水即波舉體皆動須彌偈云觀察於諸法自性無所有如其生滅相但是假名說回向品云法性不違法相又云無有智外如為智所入皆顯理即事故雖空不斷也八事法即理門謂緣起事法必無自性無自性故舉體即真如波即水無動而非濕也須彌偈云一切凡夫行莫不速歸盡其性如虗空故說無有盡回向品云法相不違法性又云無有如外智能證於如皆顯事即理故雖有不常也九真理非事門謂即事之理而非是事以真異於妄故所依非能依故實非虗故如濕非動真實慧偈云於實見真實非實見不實如是究竟解是故名為佛第四回向云於無為界示有為法而不滅壞無為之性十事法非理門謂全理之事而恆非理以相異於性故能依非所依故虗非實故如動非濕慚愧林偈云如色與非色此二不為一如相與無相生死及涅槃分別各不同回向品云於有為界示無為法而不滅壞有為之相上之十義同一緣起約理望事有成壞即離約事望理有隱顯一異逆順同時無礙自在一具十為總十非一為別互不違為同各無濫為異衆成就為成住本位為壞然上十對皆悉無礙今且約理事以為之顯耳又此能依觀中十門取一理遍事門具前所依體中十對而此理遍事中又具餘之事遍理等九門各有前十對法則為百門理遍於事既爾餘之事遍理等九門具百亦然即為千門千中取一亦具一千餘皆亦爾則成百萬一含多是總相多非一是別相各無異是同相不相同是異相共成辦是成相不離位是壞相此諸圓融無盡法門皆為理事無礙觀相經云如金與金色其性無差別法非法亦然體性無有異第三周遍含容觀者事如理融遍攝無礙交參自在略開十門一理如事法門謂事法既虗相無不盡理性真實體無不現此則事無別事即全理為事是故無盡事相即是無盡法界理也遂令法界全體在於一切塵中同時顯現周遍無礙二事如真理門謂諸事法與理非異故事隨理而圓遍遂令一塵普遍法界如一微塵既爾一切事法亦然三事含理事門謂諸事法與理非一故存本一事而能廣容如一微塵其相不大而能容攝無邊法界剎等諸法如一塵爾諸法亦然四通局無礙門重開第二謂事與理非一非異令此事法不離一處而全遍十方一切剎塵之內全遍十方一切剎塵之內而不動本位即遠即近即遍即住無障無礙五廣狹無礙門重開第三謂事與理非異非一令此一塵之事不壞一塵而能廣容十方剎海廣容十方法界而微塵不大即廣即狹即大即小無障無礙六遍容無礙門合前二三四五謂此一塵望彼一切由普遍即是廣容故此一塵遍彼一切法時還復攝彼一切諸法在一塵內又由廣容即是普遍故此一塵攝彼一切法時還即遍在自一塵內一切法中同時無礙七攝入無礙門翻第六門謂此一切望彼一法由入他即是攝他故此一切全入一法中時還攝一法在一切內由攝他即是入他故彼一法攝在一切中時還令一切恆入彼一法內同時無礙八交涉無礙門兼前六七謂一法望一切有入有攝通有四句第一一攝一切一入一切第二一切攝一一切入一第三一攝一一入一第四一切攝一切一切入一切謂此一法正攝彼一切令彼一切入一中時還即令彼一切攝此一法能令自一入一切中又彼一切正攝此一令此一法入彼一切中時還即令此一法攝彼一切能令彼一切法入此一中初二句攝入隱顯既爾餘後二句攝入亦然能所交涉同時無礙九相在無礙門翻第八門謂一切望一法亦有攝有入亦有四句第一攝一入一第二攝一切入一第三攝一入一切第四攝一切入一切謂此一切法正攝餘一法時還令攝餘一之一切入彼一中又彼一法正攝餘一切時還令攝餘一切之一入此一切法中攝一入一攝一切入一切二句既爾餘二句亦然攝入相在同時無礙十普融無礙門近收八九二門遠則通收前九謂一切及一普皆同時更互相望一一具前兩重四句第一一攝一切一入一切攝一切入一切第二一切攝一一切入一攝一入一第三一攝一一入一攝一切入一第四一切攝一切一切入一切攝一入一切謂此一法正攝餘一切餘一切入此一將入彼一切時還即令彼一切攝餘一餘一入彼一切將入此一法中又此一切法正攝餘一餘一入此一切將入彼一中時還即令彼一法攝餘一切餘一切入彼一將入此一切中初二句既爾後二句亦然同時相應普融無盡然上十義展轉相生而成十門理為事本理如事現故有初門事依理起事如理遍故有次門不唯理事相如亦且理含事理事含理事故有三門二中唯遍故有第四不動而遍三中唯包故有第五不大而包二四唯遍三五唯容故有第六亦遍亦容六但以一望多故有第七以多望一六則一能入攝七則多能攝入故有第八一多俱為能入能攝八則俱能故有第九多一俱為所攝所入六七一多互無八九能所各闕故有第十一多相即能所雙融初二門即為總意能成後之八門猶兼理事無礙有此二故得有事事無礙之義屬事事攝古德準此十義重開為十玄門一同時具足相應門二廣狹自在無礙門三一多相容不同門四諸法相即自在門五祕密隱顯俱成門六微細相容安立門七因陀羅網境界門八託事顯法生解門九十世隔法異成門十主伴圓明具德門第一同時具足相應門者教等十義同時相應成一緣起無有前後始終等別具足自在參而不雜故妙嚴品頌云一切法門無盡海同會一法道場中第二廣狹自在無礙門者十對事體或廣或狹於一句中演無邊教至大身剎涉入無內極小塵毛包納無外如是遍容無礙自在七十六摩耶夫人云我身形量雖不逾本然其實已超諸世間量同虗空悉能容受七十七善財歎樓閣云不動本處而能普詣一切佛剎十住品云金剛圍山數無量悉能安置一毛端又云佛於一一句法中經無量劫說不盡等第三一多相容不同門者此上諸義隨一門中即具攝前因果理事一切法門然此一中雖具有多仍一非即是其多耳多中一等準上思之由一與多互為緣起力用交徹遞相涉入故曰相容不壞其相故曰不同餘一一門中皆悉如是故經頌云以一佛土滿十方十方入一亦無餘世界本相亦不壞無比功德故能爾普賢行品云一切世界入一毛道一毛道入一切世界十行品云能於一一三昧中普入無數諸三昧無量無邊諸國土悉令共入一塵中第四諸法相即自在門者上十對事一即一切一切即一圓融自在故得十身歷然而相作六位不亂而更收經云初發心菩薩一念之功德深廣無邊際如來分別說窮劫不能盡何況於無邊無量無數劫具足修諸度諸地功德行又云以衆生身作剎身而亦不壞衆生身以剎身作衆生身而亦不壞於剎身不思議法品云諸佛知一切佛語即一佛語十住偈云一即是多多即一文隨於義義隨文如是一切展轉成此不退人應為說第五祕密隱顯俱成門者即上十義此全攝彼此顯彼隱彼全攝此彼顯此隱以一攝多一顯多隱以多攝一多顯一隱如是彼此一多攝入隱覆顯了俱時成就不相妨礙祕密自在雖各不同亦不雜亂故云隱顯俱時而成體無前後故云俱成各得其所自在無礙故云祕密經云此方入正受他方三昧起眼根入正受色塵三昧起男子身中入正受女子身中三昧起於一微塵入正受一毛端頭三昧起又云十方世界有緣故往返出入度衆生或見菩薩入正受或見菩薩從定起又云於彼十方世界中念念示現成正覺轉正法輪入涅槃現分舍利度衆生夜摩偈云十方一切處皆謂佛在此或見在人間或見住天宮十定品云或見佛身其量七肘或見佛身其量八肘或見佛身其量九肘乃至或見佛身不可說不可說大千世界量第六微細相容安立門者如前十事於一念中具足始終同時別時前後逆順等一切法門於一念中炳然同時齊頭顯現無不明了猶如束箭齊頭顯現耳一能含多法法皆爾故曰相容一多法相不壞不雜故云安立經云菩薩於一念中從兜率天降神母胎乃至流通舍利法住久遠及所被益諸衆生等皆悉顯現又云一毛孔中無量佛剎曠然安住又云於一塵內微細國土悉於中住第七因陀羅網境界門者上諸義中體相自在隱顯互現重重無盡如天帝殿珠網覆上一明珠內萬像俱現珠珠皆爾互相現影影復現影而無窮盡十中唯此從喻受名若就法立應名重重映現無盡門經云一切世界廣大無量粗細亂住倒住正住若入若行若去如帝網差別十方無量種種不同現前知見智皆明了第十云諸佛知一切法界中如因陀羅網諸差別事盡無有餘阿僧祇品云於一微細毛端處有不可說諸普賢一切毛端悉亦爾如是乃至遍法界一毛端處所有剎其數無量不可說盡虗空量諸毛端一一處剎悉如是又云一塵中剎不可說如一一切皆如是此不可說諸佛剎一念碎塵不可說念念所碎悉亦然此塵有剎不可說普賢三昧品云佛身所現一切國土及此國土所有微塵一一塵中有世界海微塵數佛剎一一剎中有世界海微塵數諸佛一一佛前有世界海微塵數普賢菩薩等第八託事顯法生解門者前來諸事隨託一種便顯多法即依即正即法即人即理事等一切法門以隨一事即是見於無盡法界法界無盡法亦無盡故隨一事名多法門非是託此別有所表經云從超過三界法甚深方便法無作法門出過諸天供具供佛無著無生善根所生一切寶蓮華雲一切堅固香雲一切清淨莊嚴具雲皆遍法界供養於佛又云彌勒菩薩前詣樓閣彈指出聲其門即開命善財入善財入已見其樓閣廣博無量同於虗空又見其中有無量百千諸妙樓閣一一嚴飾皆同虗空不相障礙亦無雜亂善財童子於一處中見一切處一切諸處悉如是見等第九十世隔法異成門者此諸雜義遍十世中同時顯現具足別異以法與時不相離故言十世者三世各有過現未來名為九世然此九世迭相即入攝為一念前九為別一念為總總別合論故云十世十世區分名為隔法而互相在即是異成故晉經云過去無量劫安置未來今未來無量劫回置過去世普賢行云過去中未來未來中現在三世互相見一一皆明了又云無量無數劫解之即一念發心功德品云無量劫即一念一念即無量劫十地品云一劫入多劫多劫入一劫長劫入短劫短劫入長劫等等十主伴圓明具德門者前之事體隨舉其一即便為主而居其中餘者為伴周匝圍繞由其為唱為隨無雜無礙故云主伴彼此隱顯主伴交輝故云圓明一多攝入連帶緣起故云具德如經中一方為主十方為伴餘方亦爾又現相品佛眉間出勝音菩薩與無量諸眷屬俱出即人眷屬遮那品明法界修多羅以佛剎微塵數修多羅而為眷屬即法眷屬出現品中佛放眉間光明無量百千億光明以為眷屬即光明眷屬故隨一一法中皆有其眷屬也今又於前十中取一事法明具十門一同時門者如華嚴中一蓮華葉或一微塵即具教等十對同時相應具足圓滿亦具後之九門及彼門中所具教等以是總故華藏頌云華藏世界所有塵一一塵中見法界一塵尚具況一葉耶二廣狹門者即彼華葉普周法界而不壞本位以分即無分無分即分廣狹自在無障無礙十定品云有一蓮華盡十方際而又不妨外有可見是故或唯廣無際或分限歷然或即廣即狹或廣狹俱泯或具前四以是解境故或絶前五以是行境故下皆準此然此廣狹亦名純雜義普周法界故純一無二不壞本位則不妨於雜萬行例然三相容門者即此華葉舒已遍入一切法中即攝一切令入已內舒攝同時既無障礙是故鎔融或有四句六句思之十定品云微塵數三千大千世界悉入是菩薩身是菩薩身亦入是諸世界離世間品云以一切衆生身入己身無礙用以己身入一切衆生身無礙用等若一與一切對辨則攝入各具四句謂一入一切一入一一切入一一切入一切互攝亦然四相即門者此一華葉廢己同他舉體全是彼一切法而恆攝他同己令彼一切即是己體一多相即混無障礙解行境別六句同前五隱顯門者華能攝彼則一顯多隱一切攝華則一隱多顯顯顯不俱隱隱不並隱顯顯隱同時無礙全攝俱泯存忘俱成句數同前六微細門者此華葉中微細剎等一切諸法炳然齊現七羅網門者謂此華葉與一一微塵中各現無邊剎海剎海之中復有微塵彼諸塵內復有剎海如是重重不可窮盡非是心識思量境界八託事門者見此華葉即是見於無盡法界經云此花蓋等從無生法忍之所起等九異成門者即此一花既具遍一切處亦復該一切時謂三世各三攝為一念故為十世以時無別體依華以立華既無礙時亦如是十主伴門者謂此華葉理無孤起必攝無量眷屬圍繞經云此花有十世界微塵數花以為眷屬舉花既爾一塵等事亦然事法既爾餘教義等亦然斯則十門義極深遠若非譬喻奚能了徹炳然齊現猶彼芥瓶具足同時方之流滴一多相入等虗室之千光隱顯俱成似秋空之片月重重交映若帝網之垂珠念念圓融類夕夢之經世法門層疊如雲起於長空主伴遍周例星圍於北極彼此相即像百般之具體依一金廣狹融通比徑尺之鏡影現千里所以次第者一同時門以是總故冠於九門之初二別中先辨廣狹門者此是別門之由由前初二門事理相遍故生餘八門且約事如理遍故廣不壞事相故狹故為事事無礙之始三由廣狹無礙所遍有多以己一望彼多故有一多相容相容則二體俱存但力用交徹耳四由此容彼彼便即此由此遍彼此便即彼等故有相即門五由互相攝則互有隱顯謂攝他他可見故有相入門攝他他無體故有相即門攝佛他雖存而不可見故有隱顯門此三皆由相攝而有為門別故相入則如二境互照相即則如波水相收隱顯則如片月相映六由此攝他一切齊攝彼攝亦然故有微細相容七由互攝重重故有帝網無盡八由既如常網已隨一即是一切無盡故有託事顯法九由上八門皆是所依所依之法既融次辨能依能依之時亦爾故有十世異成十由法法皆然故隨舉其一即便為主連帶緣起則有伴生故有主伴此十玄門同一緣起無礙圓融隨其一門即具一切又此十玄準前開立亦有三義一準前一門圓開為十且約事如理門事如於理同時具足多種義門故開同時如理遍應故廣住一故狹開廣狹門一事普容一切有相容門如理廢己同他有相即門事如於理能所隨緣故理隱顯事如於理一切齊攝故開微細事亦攝入重重即帝網門事亦具足無盡即託事門如理該徹十世具十世門如理帶眷屬生具主伴門事如於理一門既爾餘之九門開玄亦然此約十門中義各全具故圓開為十玄也三於前十門或開或合分立為十謂由前三總成諸門事理相如故有廣狹門事如理遍故廣理如事小故狹事含理事故有微細門第四不離一處即遍有相即門五即廣狹門六具相即廣狹二門七開相即相入二門第八交涉互為能所有隱顯門九即因陀羅網門十即同時具足門隨為十首有主伴門顯於時中有十世門諸法皆爾故有託事門此約十門中義有兼具故分立為十玄也三於前十中各開為十初則託事二乃相即三立微細四分十世五還廣狹六為相入七成隱顯八開主伴九屬帝網十是同時此約十門中義自別具故各開為一玄也將前能起十觀門中取一理如事門具後所起十重玄門而此理如事中又具餘之事如理等九種觀門每門各有十重玄門則為百門理如事門既爾餘之事如理等九門具百亦然即為千門千門之中隨取其一亦具一千餘皆例爾即為百萬若以能顯十重玄門例前所顯十種觀門亦成百萬又以能依十玄門中取一同時門具餘九門餘廣狹等九門亦具餘同時等九門則為百門一一門中各有所依教義等十對法則為千法門千中取一亦具一千餘皆亦爾則為百萬若以能依門例所依法亦成百萬又以十觀門與十對法互成百萬義例可知一總該一切是總相各別從其類是別相據理皆同成是同相隨緣各異體是異相衆緣和合成是成相壞各歸自位是壞相是故於此圓明顯了則常入法界重重之境問有何因緣令此諸法得有如是混融無礙答因廣難陳略提十類一唯心所現故二法無定性故三緣起相由故四法性融通故五如幻夢事故六如影像現故七因無限量故八佛果證窮故九深定大用故十神通解脫故初唯心所現者一切諸法真心所現如大海水舉體成波以一切法無非一心故大小等相隨心回轉即入無礙二法無定性者既唯心現從緣而生無有定性性相俱離小非定小故能容太虗而有餘以同大之無外故大非定大故能入小塵而無間以同小之無內故是則等太虗之微塵含如塵之廣剎有何難哉十住品云金剛圍山數無量悉能安置一毛端欲知至大有小相菩薩以是初發心一非定一故能是一切多非定多故能是一邊非定邊故能即中中非定中故能即邊延促靜亂等一一皆然三緣起相由者謂大法界中緣起法海義門無量就約圓宗略舉十門以釋前義一諸緣各異義謂大緣起中諸緣相望要須體用各別不相雜亂方成緣起若雜亂者失本緣起緣起不成此則諸緣各各守自一位經云多中無一性一亦無有多二互遍相資義謂此諸緣要互相遍應方成緣起如一緣遍應多緣各與彼多全為一故此一即具多箇一也若此一緣不具多一即資應不遍不成緣起此則一一各具一切經云知以一故衆知以衆故一三俱存無礙義謂凡是一緣要具前二方成緣起以要住自一方能遍應遍應多緣方是一故是故唯一多一自在無礙鎔融有其六句一或舉體全住是唯一也二或舉體遍應是多一也三或俱存四或雙泯五或總合六或全離皆思之可見經云諸法無所依但從和合起此上三門總明緣起本法竟四異體相入義謂諸門力用遞相依持互形奪故各有全有力全無力義緣起方成如地論云因不生從緣生故緣不生自因生故若各唯有力無無力則有多果過一一各生故若各唯無力無有力即有無果過以同非緣俱不生故是故緣起要互相依具力無力如闕一緣一切不成餘亦如是是故一能持多一是有力能持於多多依於一多是無力潛入一內由一有力必不與多有力俱是故無有一而不攝多也由多無力必不與一無力俱是故無有多而不入一也如一持多依既爾多持一依亦然反上思之如一望多有依有持全力無力常含多在己中潛入己在多內同時無礙多望於一當知亦爾俱存雙泯二句無礙思之五異體相即義謂諸緣相望全體形奪有有體無體義緣起方成若闕一緣餘不成起故緣義則壞得此一緣令一切成起所起成故緣義方立是故一緣是能起能成故有體多緣是所起所成故無體由一有體不得與多有體俱多無體必不與一無體俱是故無有不多之一無有不一之多一多既爾多一亦然反上思之如一望多有有體無體故能攝他同己廢己同他同時無礙多望於一當知亦爾準前思之俱存雙泯二句無礙亦思之可見六體用雙融義謂諸緣法要力用交涉全體融合方成緣起是故圓通亦有六句一以體無不用故舉體全用則唯有相入無相即義二以用無不體故舉用全體則唯有相即無相入義三歸體之用不礙用全用之體不失體是則無礙雙存亦入亦即自在俱現四全用之體體泯全體之用用亡非即非入圓融一味五合前四句同一緣起無礙俱存六泯前五句絶待離言冥同性海此上三門於初異體門中顯義理竟七同體相入義謂前一緣所有多一與彼一緣體無別故名為同體又由此一緣應多緣故有此多一所應多緣既相即入令此多一亦有即入也今且先明相入謂一緣有力能持多一多一無力依彼一緣是故一能攝多多便入一一入多攝反上應知餘義餘句準前思之八同體相即義謂前一緣所具多一亦有有體無體之義故亦相即以多一無體由本一成多即一也由本一有體能作多一令一攝多如一有多空既爾多有一空亦然餘義餘句並準前思之九俱融無礙義謂亦同前體用雙融即入自在亦有六句準前應知此上三門於前第二同體門中辨義理竟十同異圓滿義謂以前九門總合為一大緣起令多義門同時具足故有同時門由住一遍應故有廣狹自在門由就體就用故有相即相入門由異體相容具微細門異體相即具隱顯門又就用相入為顯令就體相即為隱即顯入隱亦然又由異門即入為顯令同體即入為隱同顯異隱亦然又由異體相入帶同體相入具帝網門由此大緣起即無礙法界故有託事顯法門顯於時中故有十世門相關互攝故有主伴門此第十圓滿一門就前第三門中以辨義理故知緣起法要具此十義緣方起故闕則不成經云菩薩善觀緣起法於一法中解衆多衆多法中解了一等皆其義也四法性融通者謂若唯約事則互相礙不可即入若唯約理則唯一味無可即入今則理事融通具斯無礙謂不異理之一事具攝理性時令彼不異理之多事隨所依理皆於一中現若一中攝理不盡則真理有分限失若一中攝理盡多事不隨理現則事在理外失今既一事之中全攝理盡多事豈不一中現也華藏品云華藏世界所有塵一一塵中見法界法界即事法界矣斯即總意別亦具十玄門一既真理與一切法而共相應攝理無遺即是諸門諸法同時具足二事既如理能包亦如理廣遍而不壞狹相故有廣狹純雜無礙門又性常平等故純普攝諸法故雜三理既遍在一切多事故令一事隨理遍一切中遍理全在一事則一切隨理在一事中故有一多相容門四真理既不離諸法則一事即是真理真理即是一切事故是故此一即彼一切事一切即一反上可知故有相即自在門五由真理在事各全非分故正在此時彼說為隱正在彼時此即為隱故有隱顯門六真理既普攝諸法帶彼能依之事頓在一中故有微細門七此全攝理故能現一切彼全攝理同此頓現此現彼時彼能現所現俱現此中彼現此時此能現所現亦現彼中如是重重無盡故有帝網門以真如畢竟無盡故八即事即理故隨舉一事即真法門故有託事門九以真如遍在晝夜日月年劫皆全在故在日之時不異在劫故有十世異成門況時因法豈有法融時不融耶十此事即理時不礙與餘一切恆共相應故有主伴門故一理融通十門具矣五如幻夢事者猶如幻師能幻一物以為種種幻種種物以為一物等經云或現須臾作百年等一切諸法業幻所作故一異無礙言如夢者如夢中所見廣大未移枕上歷時久遠未經斯須故攝論云處夢謂經年覺乃須臾頃故時雖無量攝在一剎那故知時處等皆如夢自在六如影像現者一切萬法略有二義一皆如明鏡含明了性一心所成故二分別所現如影像故由初義故為能現由後義故為所現故一切法互為鏡像如鏡互照而不壞本相經云遠物近物雖皆影現影不隨物而有遠近等七因無限量者謂諸佛菩薩昔在因中常修緣起無性等觀大願回向等稱法界修及餘無量殊勝因故今如所起果具斯無礙八佛果證窮者由冥真性得如性用是故一即一切無所障礙經云以一佛土滿十方十方入一亦無餘世界本相亦不壞無比功德故能爾九深定大用者謂彼海印定等諸大三昧力故令於小處而現大法無礙自在賢首品云入微塵數諸三昧一一出生塵等定而彼微塵亦不增於一普現難思剎又云衆生形相各不同行業音聲亦無量如是一切皆能現海印三昧威神力等十神通解脫者謂由十通及不思議等解脫力故小處現大皆無障疑不思議法品十種解脫中云於一塵中建立三世一切佛法等故上十中隨舉一因即能令彼諸法混融無礙自在十中前六通約法性為德相因法爾如是後二皆是業用義通因果七約起修義通德相業用八約果德唯是德相故問前十玄門於德用中通耶局耶開耶合耶答前之十門德相業用通而不局合而不開約佛則用亦德相德上用故約機則相亦稱用令知相故即用之相染淨雙融即相之用能染能淨故相及用不分兩別由上十因令前教義等十對具前同時等十門圓融無盡此等百萬六相玄門皆為周遍含容觀相經云一中解無量無量中解一了彼互生起當成無所畏然此三觀觸處可修如心之生住異滅身之行住坐臥正報生老病死依報成住壞空乃至二時衣食六根緣境一切法中皆可成觀以本不離此法界故但漸教人作行布觀頓教人作圓融觀圓教人作無礙觀又初心者行布觀久修者圓融觀後心者無礙觀又根鈍行布觀根利圓融觀根熟無礙觀皆隨機異非法有別真空觀成斷現行障成一切智證泯相理實體法界無礙觀成斷種子障成自然智證融相緣起用法界周遍觀成斷習氣障成無礙智證一真無障礙法界又依真空觀義而得成立小始二教依無礙觀義而得成立終頓二教依周遍觀義而得成立同別圓教又由小始二教方能詮顯真空觀中所具義理由終頓二教方能詮顯無礙觀中所具義理由同別圓教方能詮顯周遍觀中所具義理是故教觀並行不悖如人目足闕一不可未有無觀而有教者也此如法界觀門及華玄中釋所以唯有此五門者三時能依時也儀觀所說法也又十儀化儀也教宗化法也又教宗所稟教也三觀能修觀也如是等義散在藏文今依賢宗諸大部典略録綱要若能知此則賢家宗旨思過半矣欲廣明者當考華嚴圓覺起信玄談疏鈔及教章等餘不繁贅音釋呾音睢嚼也含味也跋陀具云跋陀婆羅華言賢護婆藪此云天慧亦云廣通高妙斷智剛柔慈悲婆稚此云團圓亦云被縛騫䭾具云佉羅騫馱此云惡陰亦云廣肩質多具云毗摩質多羅此云淨心亦云種種疑羅睺此云障持亦云覆礙尼犍此翻離繫出家外道總名盧迦此云世論登伽此云本性婆須蜜此翻世友提婆達多此云天熱亦云天授摩耶唐言大術或云大幻舍利此云身骨堅固亦云靈骨骨分肘音杻臂節也一肘一曰一尺五寸二曰一尺八寸三曰二尺迭音牒遞代互更也舒音書伸也放也悖音倍違背逆也贅音醉附贅疣瘤也賢首五教儀第六卷伏願六相十玄門一一開通而不盡三觀四法界重重證入以圓融過現未生生如意已今當事事稱心慈雲觀堂識集刻五教儀緣起五教儀者諸佛說法之規矩歷祖判釋之權衡也教理智斷皆出乎此行位因果亦不離此一乘由之而成三覺大乘由之而階三道三乘隨之而超三界人天仗之而越三途是知捨此無以瑩煜乎自體去此無以化導乎衆生外此無以宏揚乎佛教絶此無以傳持乎祖印遠此無以津梁夫末世背此無以救療乎饑時故此一書誠法門中之要典也噫諸祖教部卷多義廣末學驚心罔知所適豫初參即以為慮自庚子夏蒙先師授清涼玄談遂録出賢首教儀誦之辛丑春偶於坊閒得賢首五教儀檢之乃西蜀道間潛法師本也亦全依華玄中教儀宗趣義理三門疏鈔録成八卷持呈於先師師曰此乃清涼教儀非賢首教儀也現具華玄何勞多此乃復授以賢首教章豫即録出分教開宗所詮差別二門到此始知有賢首宗清涼宗之別壬寅閒閲佛祖統紀謂賢家有教無觀無斷無證遂以此說請決先師師以五教解誚論賢宗未知圓義解三章開示之癸卯春復將賢首清涼二祖判釋時儀及杜順法界觀合録一帙求證先師師曰觀師集四教儀録義也非録文也汝今集五教儀文義雙取可謂得矣非昔人單録華玄單録教章之可比也汝再研之還有無盡妙意得焉乙巳年有一同學在蓮居聽唯識語豫清涼十宗似為錯謬豫未之對重為考華嚴起信般若行願諸疏及圭山圓覺廣略鈔高原真唯識量等解始知清涼立無差忒但後學膚淺讀彼不讀此致多譏刺耳丙午夏重治教儀將三寶章之方便會入觀中取禪源詮之辨異會入宗中圓覺疏之空性五門教義章之機益會玄記之通妨並會教中會玄記之出沒三照指歸中之經時禪源詮之說意並會時中就正於先師師首肯曰賢家要旨今方備矣較前覺得教觀斗星時宗眉目斷證位次猶如鏡像性相空義似為掌果丁未痛師逝閉戶數載再四研磨逐一對會弗令要義有所遺漏缺者增之澀者潤之倒者次之訛者正之復刪出五教儀開蒙一卷日為常課庚成春排五教斷證圖一紙便人觀覽壬子冬天溪景淳和尚至亦以五教儀並開蒙斷證圖請正和尚合十稱曰賢首家之得人也毗盧佛之遣使也癸丑春至甲寅冬棱伽圓談十卷稿成乙卯秋脫五教儀六卷稿兼講一遍乙卯冬至戊午夏出五教儀科注四十八卷書成矣未梓逮己未秋欲論教儀諸弟子苦録不及改演棱嚴因而請先募刻豫亦發心未果偶見雲棲集中有云工大施微心力多則功自不朽遂於九月望旦立千佛願單一願一錢一單十願時岵曕戴先生並大公郎仁長並加讚善願領數單繼而髻中法師同門諸兄及餘知識檀護各各樂助即於庚申新正刻始及門中月標指又哲賢啓南詢三人閲至八月告成是則纂集此書也十五六年募刻此書也三百餘日所冀學者從凡入聖回小向大轉權成實自因至果生生利生世世救世是所願也果能依此修持不入毗盧性海乃至讀一言半句不解其教不悟其理我墮耕犁受妄語報倘有見聞生疑起謗所招罪報緣佛法致願我代受其苦所植善種因自發心願彼早成其果覽者鑒之將欲流通詳記集刻之事如此時康熙庚申年仲秋下弦日灌頂行者續法識刻賢首五教儀跋昔世尊正覺始成十身初滿即歎曰奇哉一切衆生具有如來智慧德相但以妄想執著而不證得由衆生妄想執著故如來於無言說中示其言說一以暢自本懷顯人人有此德相一以機之利鈍不同教設偏圓接引有異自大教東漸此方分宗判教者不一唯陳隋時智者大師以五時八教判釋一代聖典尚矣洎乎有唐賢首祖師起而以五教判釋之又盡善也台賢二宗並轡海內然習台者或以賢家有教無觀譏之習賢宗者以五教之名不濫而觀義自彰機收盡而理致圓備吾慈雲法主百亭兄喟然歎曰台宗四教原在大部後人録而成集曰四教儀使人易曉吾宗五教亦在諸部特未成録耳於是味教觀之神髓脫筌蹄之陋習集為五教儀所謂五教之斷證三時之通別六宗之揀濫三觀之圓漸化儀井井燦若日星成一家言善夫天溪老人之言曰毗盧佛之遣汝來者賢首祖之功臣也書既成己未秋過慈雲訪百兄出以相視一大藏教如指諸掌余因茲有感焉今海內習賢家之說少者恨無全書人難湊泊縱讀教義章華嚴大鈔轉增浩歎此後吾知崇說如雲宗嗣如雨端在是矣何慮妄想不破十身正覺之不成滿哉亟勸先以五教儀之六卷付梓其注四十八卷以俟續刻因領募願單請自隗始而為之跋東皋月明宗弟清珠謹題
