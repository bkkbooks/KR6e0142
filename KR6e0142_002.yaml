body:
  text: 清浙水慈雲沙門灌頂續法集録第三遍周三際時者謂盡前後際各無邊劫恆常周遍演說諸經初無暫息華嚴云不可說不可說佛剎微塵等劫說異句身味身音聲充滿法界一切衆生無不聞者盡一切未來際劫常轉法輪如來音聲無異無斷不可窮盡餘如不思議品梵網云三世諸佛已說今說當說我今亦如是說四分律云諸世尊大德為我說是事如過去諸佛及以未來者現在諸世尊能勝一切憂皆共尊敬戒此是諸佛法法華云如諸佛所說我亦隨順行即趣波羅奈為五比丘說又云善哉釋迦文得是無上法隨諸一切佛而用方便力我等亦皆得最妙第一法為諸衆生類分別說三乘是故以方便分別說諸果彌陀云無量壽佛威神無極十方世界無量無邊不可思議諸佛如來莫不稱歎楞伽云我念去來世所有無量佛菩薩共圍繞演說楞伽經世尊亦應爾住彼寶嚴山菩薩衆圍繞演說清淨法維摩云此經廣說過去未來現在諸佛不可思議阿耨菩提所以者何諸佛菩提皆從此生諸佛賢聖所共稱歎背生死苦示涅槃樂十方三世諸佛所說般若云一切諸佛及諸佛阿耨菩提法皆從此經出楞嚴云此是微塵佛一路涅槃門若我說是般怛羅呪經恆沙劫終不能盡又持地菩薩云聞諸如來宣妙蓮華佛知見地我先證明而為上首涅槃云如來演說一偈之義經無量劫義亦不盡所謂若戒若定若慧施等第四攝同類劫時者謂彼三際無邊劫中一一劫內各攝無量同類劫海如長劫唯攝長劫短劫唯攝短劫然時與劫各有多相如華嚴明時有八類謂長短染淨廣狹多少劫有十二類謂長短一無數有量無量有盡無盡一念不可說一切非於中復有十類謂成壞劫染汙劫染淨劫淨染劫清淨劫無邊莊嚴劫無量大莊嚴劫莊嚴滅劫莊嚴成劫普清淨劫於彼無量同類劫中恆說一切權實教門華嚴云一一地獄中經於無量劫根本獄長劫唯攝根本獄長劫眷屬獄短劫唯攝眷屬獄短劫也為度衆生故而能忍是苦不惜於身命常護諸佛法無我心調柔能得如來道梵網云吾今來此娑婆世界此天多時唯攝彼天多時彼洲少時亦唯攝此洲少時餘例知八千返說心地法楞伽云住一切剎兜率陀宮狹攝狹劫色究竟天廣攝廣劫成如來身楞嚴云應以菩薩聲聞身得度者即現菩薩聲聞身而為說法此證淨攝淨也應以人非人等身得度者即皆現之而為說法此證染攝染也法華云我說然燈佛等興成也又復言其入於涅槃滅壞也如是皆以方便分別頌云是諸罪衆生以惡業因緣過阿僧祇劫有盡攝有盡劫不聞三寶名諸有修功德柔和質直者則皆見我身常在無盡攝無盡劫此說法我此土安隱天人常充滿寶樹多華果散佛及大衆莊嚴成劫相攝衆生見劫盡大火所燒時憂怖諸苦惱如是悉充滿莊嚴滅劫相攝涅槃云往昔衆生壽百歲時有量劫攝有量恆沙衆生受地獄報我見是已即發大願受地獄身我於爾時在地獄中經無量歲無量劫攝無量為諸罪人廣開分別十二部經諸人聞已壞惡果報令地獄空第五收異類劫時者謂彼無邊一一劫中各攝無量異類劫海如長劫攝短劫短劫攝長劫等於彼一切異類劫內恆說諸法華嚴云長劫與短劫平等短劫與長劫平等一劫與無數劫平等無數劫與一劫平等有量劫與無量劫平等無量劫與有量劫平等有盡劫與無盡劫平等無盡劫與有盡劫平等不可說劫與一念平等一念與不可說劫平等一切劫入非劫非劫入一切劫淨名云即演七日以為一劫即促一劫以為七日多少時相攝楞伽云或有現變化或有先時化染淨劫相攝於彼說諸乘皆是如來地法華云是諸菩薩種種讚法而讚於佛如是時間經五十小劫佛神力故令諸大衆謂如半日又云六十小劫身心不動聽佛所說謂如食項長短劫相攝又云以方便力故現有滅不滅莊嚴滅劫與莊嚴成劫相攝也第六以念攝劫時者謂於一念之中即攝前後無量無邊同異類劫一念既爾餘一切念一一念中皆各普攝盡前後際一切劫海如是時劫說無盡教華嚴云於一念中盡知前際後際及現在一切世界成壞劫故發菩提心頌云一念普觀無量劫同異類也無去無來亦無住如是了知三世事超諸方便成十力楞伽云譬如心意一念也於無量百千由旬無量同異劫也之外憶先所見種種諸物念念相續一切念也疾詣於彼各攝無邊同異劫也非是其身及山河石壁所能為礙意生身者亦復如是如幻三昧力通自在諸相莊嚴憶本成就衆生願故猶如意去生於一切諸聖衆中淨名云諸有衆生類同異劫也形聲及威儀無畏力菩薩一時一念也能盡現或現劫盡燒天地皆洞然壞劫或作日月天梵王世界主成劫或時作地水或時作風火法華云我以如來知見力故觀彼久遠猶若今日亦一念間攝多同異劫也第七劫念重收時者謂一念中所攝劫內復有諸念而彼諸念復攝諸劫一念既爾餘一切念劫內諸念攝劫亦然是則念念既不盡劫劫亦無窮如因陀羅網重重無盡於彼諸劫說諸經海華嚴云於一念頃能知東方阿僧祇世界念攝劫也所有衆生種種差別解劫攝念也念念如是盡阿僧祇劫多念相收也南西北方四維上下亦復如是重收例東知之菩薩摩訶薩入可數劫即不可數劫劫內諸念各攝多劫也入一切劫即一念一念攝多劫念也頌云不可說諸劫即是須臾頃亦明重收莫見修與短究竟剎那法圓覺云心中了知生住滅念分劑頭數如是周遍四威儀中分別念數念攝劫無不了知漸次增進乃至得知百千世界一滴之雨劫攝念猶如目覩所受用物又云如是初靜從於一身至一世界覺亦如是念攝劫善男子若覺遍滿一世界者一世界中有一衆生起一念者皆悉能知百千世界亦復如是劫攝念楞伽云諸菩薩以本願方便願一切衆生悉入涅槃念收劫若一衆生未涅槃者我終不入劫收念淨名云一切諸法劫念也亦無在無不在相收也楞嚴云一為無量一攝多也無量為一多入一也無量義云佛一切時念劫相攝入也說大小法第八異類界劫時者謂前之七重且約同類如今娑婆一類界等今辨樹形江河形等無量無邊異類界剎剎既同處而有不同時劫亦有時劫相同而有長短各別分齊然世界形相略開二十種華嚴華藏世界品云佛子彼一切世界種或有作須彌山形或作江河形或作回轉形或作旋流形或作輪輞形或作壇墠形或作樹林形或作樓閣形或作山幢形或作普方形或作胎藏形或作蓮華形或作佉勒迦形或作衆生身形或作雲形或作諸佛相好形或作圓滿光明形或作種種珠網形或作一切門闥形或作諸莊嚴具形如是等若廣說者有世界海微塵數又收彼界總成八類謂穢世界淨世界小世界大世界粗世界妙世界狹世界廣世界並盡彼界時劫常說一切諸法華嚴云於一微細毛孔中不可說剎次第入毛孔能受彼諸剎諸剎不能遍毛孔入時劫數不可說受時劫數不可說於此行列安住時一切諸劫無能說又云或有雜染或清淨受苦受樂各差別斯由業海不思議諸流轉法恆如是一毛孔內難思剎等微塵數種種住一一皆有遍照尊在衆會中宣妙法於一塵中大小剎種種差別如塵數平坦高下各不同佛悉往詣轉法輪一切塵中所現剎皆是本願神通力隨其心樂種種殊於虗空中悉能作一切國土所有塵一一塵中佛皆入普為衆生起神變毗盧遮那法如是無量壽云羅網寶樹演發無量微妙法音流布萬種溫雅德香其有聞者塵勞垢習自然不起譬如比丘得滅盡三昧隨其時節風吹散華又寶蓮華周滿世界一一寶花出三十六百千億佛一一諸佛又放百千光明普為十方說微妙法七寶池中八功德水波揚無量自然妙聲隨其所應莫不聞者正法念云諸天遊樂池中鳧雁皆出音聲宣揚偈頌開示五欲畢竟無常不可耽玩大般若云淨土樹林內外物中常有妙音說一切法皆無自性楞嚴云林木池沼皆演法音涅槃云七寶林樹華果茂盛微風吹動出微妙音一一園中有五泉池是諸池中復有諸華是諸華中一一各有師子之座一一座上有一王坐以大乘法教化衆生楞伽云何故諸國土猶如日月形須彌及蓮華卍字師子像何故諸國土如因陀羅網覆住或側住一切寶所成何故諸國土無垢日月光或如華果形箜篌細腰鼓何因佛世尊一切剎中現異名諸色類佛子衆圍繞法華云自從是來我常在此娑婆世界說法教化亦於餘處百千萬億那由他阿僧祇國導利衆生處處自說名字不同年紀大小又以種種方便說微妙法能令衆生發歡喜心第九彼此攝入時者即彼異類界中所有時劫亦復各別相收或同異類界時互相攝入若念若劫重重無盡同前四五六七悉於彼時恆說諸門華嚴云一毛端處分正也所有剎其數無量不可說盡虗空量諸毛端一一處剎悉如是上總下別彼毛端處諸國土無量種類差別住有不可說異類剎有不可說同類剎不可言說毛端處皆有淨剎不可說此明剎界也或復於一毛端處不可說劫常安住如一毛端餘悉然所住劫數皆如是此明時劫也彼佛法身不可說彼佛分身不可說演說法門不可說調伏衆生不可說此明佛法也上毛端下微塵亦先總乃至法界悉周遍其中所有諸微塵分依也世界若成若住壞其數無量不可說次別一微塵處無邊際無量諸剎普來入十方差別不可說剎海分布不可說界剎也一一剎中有如來壽命劫數不可說劫時也諸佛所行不可說甚深妙法不可說佛法也又云我見十方世界海劫數無量等衆生上總下別或長或短或無邊以佛音聲今演說我見十方諸剎海或住國土微塵劫或有一劫或無數以願種種各不同或有純淨或純染或復染淨二俱雜或無量劫入一劫或復一劫入多劫或一切劫莊嚴事於一劫中皆現覩或一劫內所莊嚴普入一切無邊劫始從一念終成劫悉依衆生心想生一切剎海劫無邊以一方便皆清淨有清淨劫一佛興或一劫中無量現往昔修行剎塵劫獲大清淨世界海諸佛境界具莊嚴永住無邊廣大劫楞伽云住色究竟天於彼成正覺具力通自在現化於此成上同類界劫下異類界劫化身無量億遍遊一切處令愚夫得聞如響難思法此橫遍界土也遠離初先照中轉照後還照亦離於有現劫有盡無過未劫無盡非多而現多不動而普遍說衆生身中所覆之真性此竪窮時劫也化佛於諸剎演三乘一乘佛有三十六復各有十種隨衆生心器而現諸剎土此總明同異界劫相攝入也淨名云住不可思議解脫菩薩斷取三千大千世界如陶家輪著右掌中擲過恆沙世界之外攝一入一切也又菩薩以一切佛土衆生置之右掌飛到十方遍示一切而不動本處攝一切入一切也又十方世界劫盡燒時以一切火內於腹中火事如故而不為害攝一切入一也又於下方過恆河沙等諸佛世界取一佛土舉著上方過恆河沙無數世界如持針鋒舉一棗葉而無所嬈攝一入一也時維摩詰入於三昧現神通力以其右手斷取妙喜世界置於此土妙喜世界雖入此土而不增減於是世界亦不迫隘如本無異上明解脫境此以實事證楞嚴云一一同中顯現羣異一一異相各各見同界劫俱攝如是乃至十方虗空滿足微塵一一塵中現十方界現塵現界不相留礙塵界既爾時劫例然不動道場遍十方界此入彼也身含十方無盡虗空彼入此也於一毛端現寶王剎正攝依也坐微塵裏轉大法輪依攝正也法華云自我得佛來所經諸劫數無量百千萬億載阿僧祇總明同異類界劫相攝入也常說法教化無數億衆生第十以本收末時者謂以非劫為劫故非劫本劫未也如華藏界中以非劫為劫劫即非劫念等亦爾以時無長短離分限故以染時分說彼劫故以時無別體依法上立法既融通時亦隨爾故於此無量不可說劫常說諸教初無休息華嚴云菩薩摩訶薩知一切劫即是非劫而真實說一切劫數善男子菩薩智輪遠離一切分別境界不可以生死中長短染淨廣狹多少如是諸劫分別顯示劫即非劫也何以故菩薩智輪本性清淨離一切分別網超一切障礙山隨所應化而普照故非劫即劫也善男子譬如日輪無有晝夜本非劫也但出時名晝沒時名夜末即劫也菩薩智輪亦復如是無有分別亦無三世但隨心現教化衆生言其止住前劫後劫以真如法身本也遍一切法末也與一切法而共相應遍一切處持諸世間遍一切時遍在晝夜半月一月年歲成壞劫盡未來際常住無盡遍住一切衆生界安立一切衆生為衆法眼無間無斷頌云華藏世界海法界等無別莊嚴極清淨安住於虗空劫即非劫此世界海中剎種難思議一一皆自在各各無雜亂一切剎種中世界不思議或成或有壞或有已壞滅有剎住一劫或住於十劫乃至過百千國土微塵數或於一劫中見剎有成壞或無量無數乃至不思議非劫即劫或有剎有佛或有剎無佛或有唯一佛或有無量佛國土若無佛他方世界中有佛變化來為現諸佛事一一佛剎中一佛出興世經於億千歲演說無上法衆生非法器不能見諸佛若有心樂者一切處皆見一一剎土中各有佛興世一切剎中佛億數不思議此中一一佛現無量神變悉遍於法界調伏衆生海佛身無有量能示有量身隨其所應覩導師如是現佛身無處所充滿一切處如空無邊際如是難思議饒益衆生故如來出世間衆生見有出而實無興世不可以國土晝夜而見佛歲月一剎那當知悉如是衆生如是說某日佛成道末如來得菩提實不繫於日本如來離分別非世超諸數三世諸導師出現皆如是譬如淨日輪不與昏夜合本而說某日夜諸佛法如是末三世一切劫不與如來合而說三世佛導師法如是楞伽云不生而現生不滅而現滅普於諸億剎頓現如水月一身為多身隨機心中現遠離常無常而現常無常恆如是觀物不生於惡見一切法無生亦復無有滅於彼諸緣中分別生滅相淨名云法不可住本若住於法是則住法末無住則無本本從無住本立一切法末楞嚴云即一切法劫離一切相非劫唯即與離二無所著本末即入圓融一切同異所不能至同異界劫無礙法華云如來如實知見三界之相無有生死若退若出亦無在世及滅度者非實非虗非如非異劫即非劫不如三界見於三界非劫即劫常在耆闍崛山共大菩薩諸聲聞衆圍繞說法頌云是法住法位世間相常住劫即非劫道場證知已於阿僧祇劫常在靈鷲山及餘諸住處非劫即劫我常知衆生行道不行道隨所應可度為說種種法問依此說時則無始終何容有此一代時中諸部經教答一乘玄門諸佛齊證故一切如來法爾皆於無邊世界常轉如是無盡法輪令諸衆生返本還源窮未來際無有休息但隨見聞說有三時五會之別諸慈悲者為下劣衆生於無盡說中略取此等結集流通故有此等諸部教典令尋於此見無邊法如觀牗隙見無際空而此時說即同無盡以一時即一切時一說即一切說故華嚴云恆以佛日普照法界隨本願力常現不沒恆住法界無有變異問若此多劫常恆說者何故如來有涅槃耶答一切諸佛本不涅槃如華嚴法界品中開旃檀塔見三世佛無涅槃者又復涅槃亦是說法攝生與成道說法無差別故法華壽量品云為度衆生故方便現涅槃而實不滅度常住此說法華嚴出現品云若有衆生應以涅槃而得度者如來則為示現涅槃而實如來無生無滅無有滅度是故說法總無休時問智度論云須扇多佛晨朝成道日暮涅槃唯留化佛度諸衆生則知佛土亦有不說華嚴教耶答非一切佛土中皆用言語說法如淨名云有以佛所化人而作佛事乃至有以八萬塵勞作佛事等則知須扇多佛以所化身而為說法正是華嚴無盡教相中之一教相耳何云不說問據古德共云如燈明佛晨旦說法華中夜便滅度則法華之外非有別時更說涅槃謂人根利故聞法華竟不須復說涅槃又迦葉佛時亦爾則知涅槃或說不說或有國土唯說三乘究竟不破如多寶佛或有國土唯說一乘無三可破如勝雲佛則知法華亦有說不說不同華嚴我不見有一佛國土其中如來不說此法何云法華涅槃之說亦該通十方耶答說法華即是說涅槃以佛之知見不異佛性故說三乘即是說一乘諸有所作常為一事故說一乘即是說法華以頓圓別教與漸圓同教儀法雖殊而說一乘入佛慧無有別故則知法華涅槃之說亦恆遍法界也問稱性本教可爾逐機末教云何亦常演耶答末不離本故依本而成故攝論云無不從此法界流無不還歸此法界本源既遠枝派自長是故人天小教等說亦無始終時也問既諸經說皆悉常遍則五會時處豈不雜亂如菩提場說華嚴時既遍虗空周於毛道盡未來際未知鹿野苑等亦說華嚴不設爾何失二俱有過若彼不說即說處不遍說時不常若彼亦說時處即成雜亂何故以經唯云菩提場說華嚴鹿野苑說阿含今何鹿苑亦說華嚴豈不成雜亂耶答說華嚴菩提場處既遍十方一切塵道即彼鹿野苑等皆有菩提場會是故寂場無不常遍說阿含鹿野苑處既遍法界乃至塵毛即寂場等皆有鹿苑是故鹿苑無不常遍既為門不同亦不成雜亂也問若約為門不同為互相見不若相見者還成雜亂若不相見何以知遍答若約華嚴與阿含等全教相攝則彼此互無各遍法界而有隱顯不同不見也可若約諸教相資則彼此互有同遍法界而有主伴不同相見也可餘一一會一一經處皆亦如是準以思之問諸佛說教亦如是不答此佛既爾餘佛例然經云三世諸佛已說今說當說我等諸佛亦如是說問餘佛說經時處與遮那說經時處為相見不設爾何失二俱有過謂若相見即乖相遍若不相見不成主伴答見與不見二義俱成謂二互相見主伴義成見與不見相遍義成但見則同遍不見各遍以為異耳文有四句一主主不相見遮那為主時十方餘佛但得為伴不得為主若餘佛為主遮那亦即為伴不得為主二伴伴不相見如諸佛為遮那伴時遮那更不得為伴遮那為餘佛伴時餘佛亦不得又為伴矣三主伴互相見如遮那為主見餘伴佛伴佛亦見遮那四伴主互相見如遮那為伴餘佛為主兩得相見若互不相見即各遍法界彼此相攝而互無故若互得相見即同遍法界彼此相資而互有故為門不同亦無雜亂常相融攝亦無障礙問餘教云何答聲教既爾餘教例然是故通論開為十例或以音聲或現妙色或以奇香或以上味或以妙觸或以法境或內六根或四威儀或弟子人物或一切所作皆堪攝物具如不思議品說若別言聲亦有十例一如來語業圓音自說二如來毛孔出聲說法三如來光明舒音演法四令菩薩口業說法五令菩薩毛孔亦出音聲說法六令菩薩光明亦有音聲說法七令諸剎海出聲說法八令一切衆生悉為說法九遍三世中皆以音聲說法十以一切法中皆出聲說法故普賢行品云佛說菩薩說剎說衆生說三世一切說如音聲說法有此十種餘色香等皆各具十是則已為百門說法準知內內外外根根塵塵無不恆常周遍而說一切無盡法矣餘如指歸華玄等釋言十義者一本末差別門二依本起末門三攝末歸本門四本末無礙門五隨機不定門六顯密同時門七一時頓演門八寂寞無言門九該運三際門十重重無盡門第一本末差別門者謂本末同時始終一類各無異說然有三位一若小乘中則初度陳如後度須跋中間亦唯說小益小如四阿含經及五部律等二若約三乘則始終說三通益三機如密迹經等三若約一乘則始終唯為圓機說於圓極如華嚴經等其中不通小乘復攝九世該於前後更無異說然此三類依於此世根性定者常開如上一類之法故佛所演各通始終更無前後第二依本起末門者此有五類謂初為菩薩說大二為緣覺三為聲聞四為善根衆生五為邪定如出現品日照高山及三千初成喻中廣辨其相皆明先大後小約法名從本起末以於一佛乘分別說三故十八本二皆大乘出故約機各是一類之機非約一機前大後小第三攝末歸本門者依無量義初時說小次說中乘後時說大故也法華亦云昔於波羅奈轉四諦法輪今復轉最妙無上大法輪探密妙智說皆先小後大然此門中有二類人一者一人備歷小大如四大聲聞等二者先稟小人未必後時稟大以小性定故而聞後時說大故異前始終俱小後稟大人未必要從小來以有頓悟機故而知先來說小故非前始終俱大第四本末無礙門者謂初舉照山王之極說明非本無以垂末後顯歸大海之異流明非末無以歸本故本末交映與奪相資方為攝生之善巧矣是故通論總有五位一根本一乘如華嚴經二密意小乘三密意大乘四顯了三乘上三如深密經五破異一乘如法華經第五隨機不定門者謂上之四門初門明三類機始終常定次門明五類機異時常定三門明一類機自淺之深四門明二類機初機聞頓後機從淺至深更有一類不定之機或從小乘次入三乘後入一乘亦有從小直入一乘或多類機隨聞一句異解不同第六顯密同時門者謂同聽異聞若互相知者是顯不定若互不相知者即是祕密顯密同時亦無前後第七一時頓演門者謂上來諸門一時頓演華嚴云如來一語中演無邊經海無量義云佛一切時說大小等第八寂寞無言門者謂從初得道乃至涅槃不說一句般若云我從成道已來不說一字汝亦不聞涅槃云若知如來常不說法是名具足多聞楞伽云我某夜成道至某夜涅槃於此二中間我都無所說緣自得本住故我作是說彼佛及與我悉無有差別第九該通三際門者謂此上諸門盡通三際經云一法門中無量門無量千劫如是說第十重重無盡門者謂前之九門隨時隨處重重無盡皆無前後經云毗盧遮那佛願力周法界一切國土中恆轉無上輪此上十門圓通無礙是則前後即無前後無前後之前後耳言五教者一小乘教二大乘始教三終教四一乘頓教五圓教初小乘教者即愚法二乘教異大乘故逐機設故隨他語故以其明諸法數一向差別所謂揀邪正辨聖凡分欣厭析因果也二大乘始教者亦名分教但明諸法皆空未盡大乘法理故名為始但明一切法相有成佛不成佛故名為分三終教者亦名實教由明緣起無性一切皆如定性二乘無性闡提悉當成佛方盡大乘至極之說故名為終以稱實理故名為實上之二教並依地位漸次修成故總名漸四一乘頓教者但一念不生即名為佛不依地位漸次說故如思益云得諸法正性者不從一地至於一地楞伽云初地即為八無所有何次不同於前漸次修行不同於後圓融具德故立名頓問此若是教更何是理答頓詮此理故名頓教別為一類離念機故亦為對治空有俱存三種著相人故即順禪宗五圓教者統該前四圓滿具足一位即一切位一切位即一位是故十信滿心即攝五位成正覺等依普賢法界性相圓融主伴無盡身剎塵毛交遍互入故名圓教如華嚴云顯現自在力為說圓滿經無量諸衆生悉受菩提記等若廣約所詮法相辨者初小教中說有七十五法唯明人空不明法空縱說法空少不明顯但依六識三毒建立染淨根本故阿舍云貪恚愚癡是世間根本等未盡法源故多諍論總相如是若別明者略舉十門法義差別說唯六識義分為心意識除佛一人有菩提性餘諸衆生無佛種性方便資加見修證中修至忍位得不退轉聲聞下根極疾三生得羅漢果最極遲者經六十劫獨覺中根極疾四生遲經百劫如來上根定滿三祇但分段身至究竟位斷煩惱障證我空理既趣寂後皆無回心佛果相好唯是無常娑婆閻浮為佛報土三千百億即攝化境此釋迦身乃是實報非法非化或立為二即有生身化身佛別如是等義廣如小乘經論中說二始教中廣談法相少及法性其所云性亦是相數說有百法決擇分明故少諍論又說諸法一切皆空不說不空中道妙理總相如是若別明者開為二門先且對他教辨異於中分二初相宗法義略舉十門說有八識唯是生滅依生滅識建立生死及涅槃因法爾種子有無永別是故五性三乘決定不同既所立識唯業惑生故所立真如常恆不變不許隨緣依他起性似有不無非即無性真空圓成經說空義但約所執既言三性五性不同故說一分衆生決不成佛名生界不減真俗二諦迢然不同非斷非常果生因滅同時四相滅表後無根本後得緣境斷惑義說雙觀決定別照以有為智證無為理義說不異而實非一既出世智依生滅識種故四智心品為相所遷佛果報身有為無漏如是義類廣有衆多具如深密等經瑜伽雜集等論次空宗法義略有五門說一切法皆無自性即是真如以此無性而為其名凡愚不了著於法相故但標名而遮其非能了此者即名真智所詮法義不出二諦差別法相乃名為俗無為義性即名為真有謂依計空謂圓成雖說佛身五求不得得即虗妄無得乃真離一切相名佛功德故以有我為妄無我為真如是義類亦有衆多具如諸部般若等經中觀百門等論次正約當法廣明復有十門說賴耶識為諸法依從業種生唯是生滅就有為中立五種性由法爾故無始時來一切有情有無永別資等五位乾等十地修至加行性地位中得不退墮成菩提道定滿三祇亦是分段至究竟果聲聞緣覺斷煩惱種分斷所知菩薩俱斷決定性者趣寂不回不定性者並回向大三十二相是化身好八萬四千是報身德但此修生及佛法身俱常無常以釋迦身隨他受用實報淨土在首羅天化身充滿百億閻浮如來法身唯真境界釋迦佛身化非法報或分生身法身二佛或開三身或立四佛如是等義詳如佛地阿毗達磨大品等經顯揚智度攝論中說二終教中多談法性少及法相其所云相亦會歸性盡大乘說故無諍論由明不空真如中道不但說空以為至極總相如是若別明者亦開二門先且對他教辨異於中亦二初對相宗揀顯法義亦有十門所說八識通如來藏隨緣成立生滅與不生滅和合而成非一非異一切衆生平等一性皆同一乘同一解脫但是真如隨緣成立依他無性即是圓成一理齊平故說生界佛界不增不減第一義空該通真妄真非俗外即俗而真故雖空不斷雖有不常四相同時體性即滅緣境斷惑不二而二有能所斷二而不二說為內證照惑無本即是智體照體無自即是證如非智外如為智所證非如外智能證於如既世出世智依如來藏始本不二則有為無為非一非異故佛化身即當即法不墮諸數況於報體即體之智非相所遷次對空宗揀顯法義亦有五門但明自性清淨本然常住真心方為實理此真如體唯是一心即以此心為其名目權乘不了住平等空非諸法性故令認體而表其是一心真實本自能知通於理智徹於染淨所詮法義具足三諦色等即空是為真諦空即色等乃為俗諦一真心性非色非空能色能空名為中道第一義諦就二諦中一真法性目之為真種種義相稱之為俗遍計執性情有理無依他起性相有性無圓成實性情無理有相無性有一切諸佛自體皆具常樂我淨真實功德身智通光一一無盡性自本有不待機緣故以無我為妄有我為真後正約當法廣明亦有十門說梨耶識乃是真如隨緣合成是故八識通如來藏非唯生滅就真如中立種性故遍諸衆生皆有佛性信等五十二位之中修至初住即得不退行成佛果不定三祗亦無百劫修相好業地前留惑受分段身初地斷種受變易身於二障中正使習氣三賢伏現見道除種地上侵習佛位究淨一切二乘無不回心報身相好八萬四千修生法身亦常無常所住依果在三界外數世界種無量恆沙為一佛界所攝化境如來法身唯以妙智或以境智釋迦佛身亦法報化或開二佛三身或立四佛五身如是等義詳如勝鬘本業仁王瓔珞等經佛性寶性起信論等中說四頓教中總不說法相唯辨真性一切所有唯是妄想一切法界唯是絶言五法與三自性俱空八識及二無我盡遣訶教勸離毀相泯心生心即妄不生即佛亦無佛無不佛無生無不生如淨名默住顯不二等是其意也總相如是若別明者亦有十門法義差別說一切法唯一真如離言說相名為種性一念不生即名為佛有何行位漸次差別既唯一念無時可說所依身分亦不可說一切煩惱本來自離二乘聲聞非回不回一切佛身唯一法身相盡離念平等平等不可說有功德差別亦不可說常與無常依真而住非有國土如來法身非智非境釋迦佛身法非報化是故唯立一實性佛如是等義廣如淨名圓覺楞伽寶積等經般若涅槃論等中說五圓教中所說唯是無盡法界性海圓融緣起無礙相即相入如因陀羅網重重無際微細相容主伴無盡十十法門各攝法界總相如是若別明者亦有十門法義差別說一法界性起為心或開十心以彰無量菩薩種性即因即果盡三世間一切諸法甚深廣大與法界等攝前諸教所明行位始從十信乃至佛地六位不同隨得一位得一切位一切時分悉皆不定念劫圓融自在無礙但分段身至於十地斷除惑障一即一切一切二乘並已回竟悉無所回佛實相好有十蓮華藏世界海微塵數相彼一一相皆遍法界業用亦爾然德用體通常無常靈山淨土華藏世界無量雜類諸國土海皆是十佛攝化境界如來法身境智存泯或具或絶釋迦佛身非但三身亦即十身故立十佛以顯無盡如是等義廣如法華涅槃華嚴等經十地不思議等論說以上諸教所指經論然取多分略出一二實非局判以一經一論中容有多教故下俱倣此若別出斷證分齊者初小教中先明聲聞依四諦教斷煩惱障言四諦者一苦諦別明二十五有總則六道生死二十五有者謂四洲四惡趣六欲并梵天四禪四空處無想及那含也六道者謂地獄畜生餓鬼修羅及人天也雖然苦樂不同畢竟生死相續二集諦即見思惑亦云見修又云四住染汙無知界內惑等三滅諦滅前苦集顯偏真理因滅會真滅非真諦四道諦略則戒定慧廣則三十七品一四念處謂觀身不淨觀受是苦觀心無常觀法無我二四正勤謂未生惡者令惡不生已生惡者令惡消滅未生善者令善發生已生善者令善增長三四如意足謂欲念進慧四五根謂信進念定慧五五力同上信等根名六七覺支謂念擇進喜輕安定捨七八正道謂正見思惟語業進定念命然四諦中前二為世間因果謂苦果集因後二為出世因果謂滅果道因聲聞根鈍知苦斷集慕果修因故世出世皆前果後因也言煩惱者即見思惑見是分別思是俱生見有八十八使謂貪瞋癡慢疑五鈍使身見邊見邪見見取戒取五利使歷三界四諦下增減不同成八十八謂欲界苦下十使具足集滅下各七使除身邊戒道下八使除身邊見共為三十二上二界四諦下各除瞋使餘皆如欲界共為二十八二界合成五十六并前欲界三十二共有八十八也思有八十一品謂三界分為九地欲界合為一地四禪四空為八欲界地中有九品貪瞋癡慢謂上上上中上下中上中中中下下上下中下下上上一品獨潤二生上中上下二品共潤二生中上一品獨潤一生中中中下二品共潤一生下上一品獨潤半生下中下下二品共潤半生具不善性及有覆性故潤七生上八地中各有九品唯除瞋使以為定力所攝伏故唯有覆性不多潤生三界共有八十一也前分別惑名之為粗強思計度而生起故亦名發業煩惱能發業故後俱生惑名之為細與身俱生任運起故亦名潤生煩惱能潤生故其間行位略開為五一資糧位修三觀行初五停心觀一多貪衆生不淨觀二多瞋衆生慈悲觀三多散衆生數息觀四多癡衆生因緣觀五多障衆生念佛觀二別相念觀即上四念處是三總相念觀謂觀身不淨受心法皆不淨乃至觀法無我身受心亦無我但此位中惟觀苦諦伏煩惱惑二加行位有四一暖位創觀四諦修十六行二頂位用觀同前轉更明朗三忍位有三下忍遍觀八諦修三十二行中忍縮觀漸減緣行乃至一行二剎那在名中忍滿即入上忍上忍惟觀欲界苦諦但有一行二剎那在前一剎那盡名上忍滿即入世第一四世第一位亦惟觀欲界苦即上忍位二剎那中後一剎那盡名世第一滿引入無漏見道此之四位漸能伏除煩惱分別三通達位即初果位從世第一後心生苦忍真明次於八諦下發八忍八智總十六心十六心中前十五心無間道時名預流向至十六心解脫道時名預流果此位斷三界八十八使分別見惑見真諦故又名見道四修習位謂於欲界九品俱生思煩惱中若斷前六品斷至第五品解脫道時名一來向斷至第六品解脫道時名一來果若斷後三品斷至第二品解脫道時名不還向斷至第三品解脫道時名不還果若斷上八地七十二品俱生思煩惱中斷至第七十一品解脫道時名羅漢向自從預流正住果後進斷修惑已來齊此解脫皆修道攝五無學位謂斷至第七十二品解脫道時證五分法身名羅漢果此位斷分別俱生煩惱並盡子縛已斷果縛猶存名有餘涅槃若灰身泯智名無餘涅槃次明辟支有二類別一緣覺值佛出世稟十二因緣教所謂一無明二行三識四名色五六入六觸七受八愛九取十有十一生十二老死然此觀境與前四諦開合異耳謂無明行愛取有五支合為集諦餘識名色入觸受生老死七支開為苦諦觀因緣智即為道諦十二支滅即為滅諦但緣覺人先觀集諦若生起門觀者謂無明緣行乃至生緣老死若還滅門觀者謂無明滅則行滅乃至生滅則老死滅由觀因緣覺真諦理故名緣覺二獨覺出無佛世獨宿孤峰觀物變易自覺無生故名獨覺雖名不同行位無別此人斷三界分別俱生與聲聞同更侵煩惱習氣故居其上後明佛從本因地初發心時緣四諦境發四弘願一未度者令度即衆生無邊誓願度此緣苦諦境二未解者令解即煩惱無盡誓願斷此緣集諦境三未安者令安即法門無量誓願學此緣道諦境四未得涅槃者令得涅槃即佛道無上誓願成此緣滅諦境既已發大心須行行填願於三祗劫修六度行言三祇者且約我佛釋迦修行菩薩道時論分限者從古釋迦至尸棄佛值七萬五千佛名初一阿僧祇從此常離女身及四惡趣然不自知當來作佛若望聲聞位即五停心總別念處次從尸棄至然燈佛值七萬六千佛名第二阿僧祇此時用七莖蓮華供養布髮掩泥得受記莂號釋迦文爾時自知作佛口未能說若望聲聞位即暖位次從然燈至毗婆尸佛值七萬七千佛名第三僧祇滿此時自知亦向人說必當作佛自他不疑若望聲聞位即頂位經如許時修行六度然修六度各有滿時如尸毗王代鴿檀滿普明王捨國尸滿羼提仙人為歌利王割截無恨忍滿大施太子抒海并七日翹足讚弗沙佛進滿尚闍黎鵲巢頂上禪滿劬嬪大臣分閻浮提七分息諍智滿修度滿後更住百劫種相好因修百福成一相如云大千盲人治差為一福等若望聲聞是下忍位次入補處生兜率托胎出胎出家降魔安住不動為中忍位次一剎那入上忍位後一剎那入世第一位發真無漏三十四心頓斷分別俱生煩惱習氣在於染變化土成劣應身佛坐生草座說小乘諦緣之法令彼一類下下凡夫外道轉凡成聖也音釋維摩此云淨名亦云無垢般怛羅唐言傘蓋用覆一切也娑婆此云堪忍衆生能忍此上苦故由旬此云限量如此方驛也小者四十里中者六十里大者八十里因陀羅秦言能作天主即帝釋也楞嚴涅槃云首楞者名一切事竟嚴者名固即一切事究竟堅固也輞音罔車輪外圍曰輞墠音善築土為壇除地為墠佉勒迦唐言竹篅盛穀麥圓囤也闥音塔小門也毗盧遮那唐言廣大生息圭山云理智不分之真身也卍音萬乃佛胸前吉祥海雲相也此是吉祥萬德之所集耳隘矮去聲狹陋險也耆闍崛此云靈鷲須扇多佛名此云甚淨迦葉此云飲光闡提涅槃云一闡云信提云不具信不具足名曰闡提瑜伽此翻相應賴耶亦云阿梨耶梁名無沒識唐翻為藏識首羅具云摩醯首羅此翻大自在天阿毗達磨此云無比法新云對法論名那含此云不還羅漢華言應供謂應受人天供養也莂音別繫草以記謂之記莂今授彼記如草繫比丘也尸毗唐言與檀具云檀那秦言布施尸具云尸羅秦言持戒羼提秦言忍辱歌利此云惡生又云無道唐言鬪諍抒音汝舒泄水也挹也酌取也翹音喬翹足舉足望也弗沙唐言增盛明達勝義故闍黎華言軌範謂於衆中作軌範故賢首五教儀第二卷伏願通三時十儀於法界主伴重重演四乘五教於剎塵圓音落落普度含靈齊成正覺慈雲觀堂識
